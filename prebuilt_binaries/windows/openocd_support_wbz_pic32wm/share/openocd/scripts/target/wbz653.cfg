# OpenOCD Target Config for Microchip WBZ653

# --- Setup DAP and CPU ---
source [find target/swj-dp.tcl]

if { [info exists CHIPNAME] } {
   set _CHIPNAME $CHIPNAME
} else {
   set _CHIPNAME wbz653
}

if { [info exists ENDIAN] } {
   set _ENDIAN $ENDIAN
} else {
   set _ENDIAN little
}

if { [info exists DAP_TAPID] } {
   set _DAP_TAPID $DAP_TAPID
} else {
   # set _DAP_TAPID 0x04D8904C
   set _DAP_TAPID 0x04D8810B
}

transport select swd

swj_newdap $_CHIPNAME cpu -irlen 4 -expected-id $_DAP_TAPID
dap create $_CHIPNAME.dap -chain-position $_CHIPNAME.cpu

set _TARGETNAME $_CHIPNAME.cpu
target create $_TARGETNAME cortex_m -endian $_ENDIAN -dap $_CHIPNAME.dap

# --- Work Area in RAM ---
$_TARGETNAME configure -work-area-phys 0x20000000 \
                       -work-area-size 0x80000 \
                       -work-area-backup 0

$_TARGETNAME configure -event reset-deassert-post {
        wbz653 dsu_reset_deassert
}

# --- Reset Behavior ---
reset_config srst_only srst_nogate

adapter speed 4000

if {![using_hla]} {
   # if srst is not fitted use SYSRESETREQ to
   # perform a soft reset
   cortex_m reset_config sysresetreq
}

# --- Flash Banks ---

flash bank wbz653_flash wbz653 0x01000000 0x00200000 0 0 $_TARGETNAME

flash bank wbz653_Secure_boot wbz653 0x00000000 0x10000 0 0 $_TARGETNAME

flash bank wbz653_boot wbz653 0x00800000 0x10000 0 0 $_TARGETNAME

flash bank wbz653_device_config wbz653 0x00810000 0x1000 0 0 $_TARGETNAME

flash bank wbz653_otp_config wbz653 0x00811000 0x1000 0 0 $_TARGETNAME

flash bank wbz653_config_CM4F wbz653 0xE000ed10 0x100 0 0 $_TARGETNAME
